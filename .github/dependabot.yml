# Dependency scanning (Tier-1 security, non-blocking / shift-left).
# Surfaces vulnerable + outdated deps as PRs early, without gating ship velocity.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine bumps into one PR to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
