# Local development database.
#   docker compose up -d      # start Postgres in the background
#   pnpm db:migrate           # apply migrations
#   docker compose down       # stop (data persists in the named volume)
#   docker compose down -v    # stop and wipe data
#
# Credentials match the "Local docker" DATABASE_URL in .env.example:
#   postgresql://postgres:postgres@localhost:5432/app
# Host port defaults to 5432; override with DB_PORT in .env if 5432 is taken
# (and update the port in DATABASE_URL to match).
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
