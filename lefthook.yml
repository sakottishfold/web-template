pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec oxlint {staged_files}
    - name: oxfmt
      glob: "*.{js,jsx,ts,tsx,json,css}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: test
      run: pnpm test
